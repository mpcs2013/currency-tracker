name: _reusable-format

# This workflow is a library. It is called by other workflows via `jobs.X.uses:`.
# It is intentionally NOT triggered by push/PR/dispatch — see Phase 0.C playbook.
on:
  workflow_call:

# Minimal permissions: format verification only needs to read the source tree.
permissions:
  contents: read

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          # No dotnet-version override — let setup-dotnet read global.json so the
          # SDK is pinned in exactly one place.
          global-json-file: global.json

      - name: Restore .NET local tools
        run: dotnet tool restore
        # Reads .config/dotnet-tools.json from Phase 0.5 and installs
        # csharpier + dotnet-format at the pinned versions.

      - name: Verify formatting (dotnet format)
        run: dotnet format --verify-no-changes --severity error --verbosity diagnostic

      - name: Verify formatting (csharpier)
        run: dotnet csharpier check .