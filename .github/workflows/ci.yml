name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect non-doc changes
        id: filter
        shell: bash
        run: |
            # On push to main / manual dispatch, always run the full pipeline.
            if [ "${{ github.event_name }}" != "pull_request" ]; then
                echo "code=true" >> "$GITHUB_OUTPUT"
                echo "::notice::${{ github.event_name }} event - running full CI."
                exit 0
            fi
            base="${{ github.event.pull_request.base.sha }}"
            changed="$(git diff --name-only "$base" HEAD)"
            echo "Changed files:"
            echo "$changed"
            # code = any changed file that is NOT a doc (skippable set: **/*.md, docs/**).
            if printf '%s\n' "$changed" | grep -vqE '(\.md$|^docs/)'; then
                echo "code=true" >> "$GITHUB_OUTPUT"
            else
                echo "code=false" >> "$GITHUB_OUTPUT"
                echo "::notice::Doc-only change - skipping build, tests, and integration jobs."
            fi

  ci:
    name: ci
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Detect C# sources
        id: detect
        shell: bash
        run: |
            if compgen -G "**/*.csproj" > /dev/null; then
                echo "has_csharp=true" >> "$GITHUB_OUTPUT"
            else
                echo "has_csharp=false" >> "$GITHUB_OUTPUT"
                echo "::notice::No .csproj files yet — skipping build and test."
            fi

      - name: Install CSharpier
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet tool install -g csharpier

      - name: CSharpier check
        if: steps.detect.outputs.has_csharp == 'true'
        run: csharpier --check .

      - name: Format check
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet format --verify-no-changes --no-restore

      - name: Restore
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet restore --locked-mode

      - name: Build
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet build -c Release --no-restore

      - name: Test
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet test -c Release --no-build

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read           # read the source
      security-events: write   # upload SARIF alerts to the Security tab
      actions: read            # read workflow run metadata (private-repo requirement; harmless on public)
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

  aspire-smoke:
    name: aspire-smoke
    needs: [changes, ci]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build smoke tests
        run: dotnet build tests/CurrencyTracker.AppHost.SmokeTests --configuration Release --no-restore

      - name: Run aspire smoke
        run: dotnet test tests/CurrencyTracker.AppHost.SmokeTests --configuration Release --no-build

  infrastructure-integration-tests:
    name: infrastructure-integration-tests
    needs: [changes, ci]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build integration tests
        run: dotnet build tests/CurrencyTracker.Infrastructure.IntegrationTests --configuration Release --no-restore

      - name: Run integration tests
        run: dotnet test tests/CurrencyTracker.Infrastructure.IntegrationTests --configuration Release --no-build