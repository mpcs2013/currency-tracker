name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Detect C# sources
        id: detect
        shell: bash
        run: |
            if compgen -G "**/*.csproj" > /dev/null; then
                echo "has_csharp=true" >> "$GITHUB_OUTPUT"
            else
                echo "has_csharp=false" >> "$GITHUB_OUTPUT"
                echo "::notice::No .csproj files yet — skipping build and test."
            fi

      - name: Install CSharpier
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet tool install -g csharpier

      - name: CSharpier check
        if: steps.detect.outputs.has_csharp == 'true'
        run: csharpier --check .

      - name: Format check
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet format --verify-no-changes --no-restore

      - name: Restore
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet restore --locked-mode

      - name: Build
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet build -c --no-restore

      - name: Test
        if: steps.detect.outputs.has_csharp == 'true'
        run: dotnet test -c Release --no-build

  aspire-smoke:
    name: aspire-smoke
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build smoke tests
        run: dotnet build tests/CurrencyTracker.AppHost.SmokeTests --configuration Release --no-restore

      - name: Run aspire smoke
        run: dotnet test tests/CurrencyTracker.AppHost.SmokeTests --configuration Release --no-build
